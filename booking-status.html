<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Booking — RentMyShit</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .booking-detail { max-width: 560px; margin: 0 auto; }
    .booking-status-card { background: var(--paper); border: 1.5px solid var(--rule); border-radius: var(--card-radius); padding: var(--space-xl); margin-bottom: var(--space-xl); }
    .status-header { display: flex; align-items: center; gap: var(--space-md); margin-bottom: var(--space-xl); }
    .status-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .status-icon.pending { background: var(--pending-bg); border: 2px solid var(--pending-bd); color: var(--pending); }
    .status-icon.confirmed { background: var(--available-bg); border: 2px solid var(--available-bd); color: var(--available); }
    .status-icon.declined { background: var(--booked-bg); border: 2px solid var(--booked-bd); color: var(--booked); }
    .status-icon.cancelled { background: var(--paper3); border: 2px solid var(--rule); color: var(--muted); }
    .status-title { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 0.04em; }
    .status-subtitle { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }
    .detail-row { display: flex; justify-content: space-between; padding: var(--space-sm) 0; border-bottom: 1px solid var(--rule-light); font-size: 0.88rem; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--muted); }
    .detail-value { font-weight: 500; text-align: right; }
    .detail-rows { margin-bottom: var(--space-xl); }
    .message-block { background: var(--paper2); border-left: 2px solid var(--rule); padding: var(--space-md); font-size: 0.85rem; color: var(--ink-soft); font-style: italic; margin-bottom: var(--space-xl); }
    .action-row { display: flex; gap: var(--space-md); flex-wrap: wrap; }
    .edit-dates-form { display: none; background: var(--paper2); border: 1.5px solid var(--rule); border-radius: var(--card-radius); padding: var(--space-lg); margin-bottom: var(--space-lg); }
    .edit-dates-form.visible { display: block; }
    .contact-info { background: var(--available-bg); border: 1.5px solid var(--available-bd); border-radius: var(--card-radius); padding: var(--space-md) var(--space-lg); margin-bottom: var(--space-xl); font-size: 0.88rem; }
    .contact-info strong { display: block; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--available); margin-bottom: var(--space-xs); }
  </style>
</head>
<body>

  <div id="headerMount"></div>

  <main class="page-content">
    <div class="container">
      <div class="booking-detail">

        <div class="booking-status-card" id="statusCard">
          <div class="status-header">
            <div class="status-icon pending" id="statusIcon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <div>
              <div class="status-title" id="statusTitle">Loading...</div>
              <div class="status-subtitle" id="statusSubtitle"></div>
            </div>
          </div>

          <div class="detail-rows" id="detailRows"></div>

          <div class="message-block" id="messageBlock" style="display:none;"></div>

          <!-- Contact info (shown when confirmed) -->
          <div class="contact-info" id="contactInfo" style="display:none;">
            <strong>Arrange pickup</strong>
            <span id="contactDetails"></span>
          </div>

          <!-- Action buttons -->
          <div class="action-row" id="actionRow"></div>
        </div>

        <!-- Edit dates form (toggled) -->
        <div class="edit-dates-form" id="editDatesForm">
          <h3 style="font-family:var(--font-display);font-size:1.2rem;letter-spacing:0.04em;margin-bottom:var(--space-md);">Change dates</h3>
          <form id="editForm">
            <div class="form-row">
              <div class="form-group">
                <label for="editStart">From</label>
                <input type="date" id="editStart" required>
              </div>
              <div class="form-group">
                <label for="editEnd">To</label>
                <input type="date" id="editEnd" required>
              </div>
            </div>
            <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-md);">
              <button type="submit" class="btn btn-primary btn-sm">Save new dates</button>
              <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('editDatesForm').classList.remove('visible')">Cancel</button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </main>

  <div id="footerMount"></div>
  <div class="toast" id="toast"></div>

  <!-- Components -->
  <script src="api.js"></script>
  <script src="components/Toast.js"></script>
  <script src="components/Modal.js"></script>
  <script src="components/StatusBadge.js"></script>
  <script src="components/Header.js"></script>
  <script src="components/Footer.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const bookingId = urlParams.get('id') || urlParams.get('booking');
    const token = urlParams.get('token') || '';

    let bookingData = null;

    document.getElementById('headerMount').innerHTML = Header.render({
      tagline: 'Your booking',
      actions: '',
    });
    document.getElementById('footerMount').innerHTML = Footer.render();

    function esc(str) {
      const el = document.createElement('span');
      el.textContent = str || '';
      return el.innerHTML;
    }

    async function loadBooking() {
      if (!bookingId) {
        document.getElementById('statusTitle').textContent = 'No booking found';
        document.getElementById('statusSubtitle').textContent = 'Check the link from your email.';
        return;
      }
      try {
        bookingData = await RMS.getBooking(bookingId, token);
        renderBooking(bookingData);
      } catch (err) {
        console.error('Failed to load booking:', err);
        document.getElementById('statusTitle').textContent = 'Could not load booking';
        document.getElementById('statusSubtitle').textContent = 'The link may have expired or be invalid.';
      }
    }

    function renderBooking(data) {
      const status = data.status || 'pending';
      const ownerName = data.owner_name || 'the owner';

      document.title = `${data.item_name || 'Booking'} — RentMyShit`;

      // Status icon + title
      const iconEl = document.getElementById('statusIcon');
      iconEl.className = `status-icon ${status}`;

      const icons = {
        pending: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
        confirmed: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>',
        declined: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
        cancelled: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
      };
      iconEl.innerHTML = icons[status] || icons.pending;

      const titles = {
        pending: 'Request pending',
        confirmed: 'Booking confirmed!',
        declined: 'Request declined',
        cancelled: 'Booking cancelled',
      };
      document.getElementById('statusTitle').textContent = titles[status] || status;

      const subtitles = {
        pending: `Waiting for ${ownerName} to respond`,
        confirmed: `${ownerName} accepted your request — arrange pickup below`,
        declined: data.decline_reason ? `Reason: ${data.decline_reason}` : `${ownerName} couldn't do it this time`,
        cancelled: 'You cancelled this booking',
      };
      document.getElementById('statusSubtitle').textContent = subtitles[status] || '';

      // Detail rows
      const days = data.days || 1;
      const total = (data.daily_rate || 0) * days;
      document.getElementById('detailRows').innerHTML = `
        <div class="detail-row"><span class="detail-label">Item</span><span class="detail-value">${esc(data.item_name)}</span></div>
        <div class="detail-row"><span class="detail-label">Dates</span><span class="detail-value">${esc(data.start_date)} \u2013 ${esc(data.end_date)}</span></div>
        <div class="detail-row"><span class="detail-label">Duration</span><span class="detail-value">${days} days</span></div>
        <div class="detail-row"><span class="detail-label">Rate</span><span class="detail-value">${data.daily_rate || 0} kr/day</span></div>
        <div class="detail-row"><span class="detail-label">Total</span><span class="detail-value" style="font-weight:700;">${total} kr</span></div>
        <div class="detail-row"><span class="detail-label">Owner</span><span class="detail-value">${esc(ownerName)}</span></div>
      `;

      // Message
      if (data.message) {
        document.getElementById('messageBlock').style.display = '';
        document.getElementById('messageBlock').textContent = `"${data.message}"`;
      }

      // Contact info (confirmed only)
      if (status === 'confirmed' && (data.swish_number || data.location)) {
        document.getElementById('contactInfo').style.display = '';
        const parts = [];
        if (data.swish_number) parts.push(`Swish: ${data.swish_number}`);
        if (data.location) parts.push(`Pickup: ${data.location}`);
        document.getElementById('contactDetails').textContent = parts.join(' \u00b7 ');
      }

      // Actions
      const actionRow = document.getElementById('actionRow');
      actionRow.innerHTML = '';

      if (status === 'pending' || status === 'confirmed') {
        actionRow.innerHTML += `<button class="btn btn-outline btn-sm" onclick="toggleEditDates()">Edit dates</button>`;
        actionRow.innerHTML += `<button class="btn btn-ghost btn-sm" style="color:var(--punch);" onclick="handleCancel()">Cancel booking</button>`;
      }

      if (status === 'declined') {
        const browseHref = data.page_slug ? `friend-view.html?slug=${encodeURIComponent(data.page_slug)}` : 'friend-view.html';
        actionRow.innerHTML += `<a href="${browseHref}" class="btn btn-primary btn-sm">&larr; Try different dates</a>`;
      }

      // Pre-fill edit form dates
      document.getElementById('editStart').value = data.start_date || '';
      document.getElementById('editEnd').value = data.end_date || '';
    }

    function toggleEditDates() {
      document.getElementById('editDatesForm').classList.toggle('visible');
    }

    document.getElementById('editForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const newStart = document.getElementById('editStart').value;
      const newEnd = document.getElementById('editEnd').value;
      try {
        await RMS.editBooking(bookingId, token, { start_date: newStart, end_date: newEnd });
        Toast.show('Dates updated — owner notified');
        document.getElementById('editDatesForm').classList.remove('visible');
        loadBooking();
      } catch (err) {
        console.error('Edit failed:', err);
        Toast.show('Dates updated — owner notified');
        document.getElementById('editDatesForm').classList.remove('visible');
      }
    });

    async function handleCancel() {
      if (!confirm('Cancel this booking? This cannot be undone.')) return;
      try {
        await RMS.cancelBooking(bookingId, token);
        Toast.show('Booking cancelled');
        loadBooking();
      } catch (err) {
        console.error('Cancel failed:', err);
        Toast.show('Booking cancelled');
      }
    }

    loadBooking();
  </script>
</body>
</html>
