<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/r/">
  <title>Your booking — FörRåd</title>
  <link rel="stylesheet" href="../slices/shared/styles.css">
  <style>
    .booking-wrap { max-width: 480px; margin: 0 auto; padding: var(--space-xl) var(--space-lg); }
    .status-hero { text-align: center; padding: var(--space-xl) 0; }
    .status-icon { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto var(--space-md); }
    .status-icon.pending { background: var(--pending-bg); border: 2px solid var(--pending-bd); color: var(--pending); }
    .status-icon.accepted { background: var(--available-bg); border: 2px solid var(--available-bd); color: var(--available); }
    .status-icon.declined, .status-icon.cancelled { background: var(--booked-bg); border: 2px solid var(--booked-bd); color: var(--booked); }
    .status-title { font-family: var(--font-display); font-size: 1.8rem; letter-spacing: 0.06em; margin-bottom: var(--space-sm); }
    .status-sub { font-size: 0.88rem; color: var(--muted); line-height: 1.55; }
    .item-card-mini { display: flex; gap: var(--space-md); align-items: center; background: var(--paper2); border: 1.5px solid var(--rule); border-radius: var(--card-radius); padding: var(--space-md); margin-bottom: var(--space-xl); }
    .item-thumb { width: 64px; height: 64px; border-radius: 4px; object-fit: cover; background: var(--rule); flex-shrink: 0; }
    .item-thumb-placeholder { width: 64px; height: 64px; border-radius: 4px; background: var(--rule); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--faint); }
    .item-info { flex: 1; }
    .item-info strong { display: block; font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 0.04em; }
    .item-info span { font-size: 0.82rem; color: var(--muted); }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: var(--space-sm) 0; border-bottom: 1px solid var(--rule); font-size: 0.88rem; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--muted); font-size: 0.75rem; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; }
    .detail-value { font-weight: 500; }
    .contact-box { background: var(--available-bg); border: 1.5px solid var(--available-bd); border-radius: var(--card-radius); padding: var(--space-md) var(--space-lg); margin: var(--space-xl) 0; }
    .contact-box h3 { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--available); margin-bottom: var(--space-md); }
    .section-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: var(--space-md); margin-top: var(--space-xl); }
  </style>
</head>
<body>
  <div id="headerMount"></div>

  <div class="booking-wrap">
    <div id="loadingState" style="text-align:center;padding:var(--space-xl);color:var(--muted);">Loading…</div>
    <div id="bookingContent" style="display:none;">
      <!-- Status hero -->
      <div class="status-hero">
        <div class="status-icon" id="statusIcon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="status-title" id="statusTitle">Pending</div>
        <div class="status-sub" id="statusSub"></div>
      </div>

      <!-- Item summary -->
      <div class="item-card-mini">
        <div id="itemThumb" class="item-thumb-placeholder">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <div class="item-info">
          <strong id="itemName">—</strong>
          <span id="itemDates">—</span>
        </div>
      </div>

      <!-- Booking details -->
      <div class="section-title">Booking details</div>
      <div id="detailRows"></div>

      <!-- Contact info (accepted only) -->
      <div id="contactBox" class="contact-box" style="display:none;">
        <h3>Pickup details</h3>
        <div id="contactDetails"></div>
      </div>

      <!-- Cancel button -->
      <div id="cancelSection" style="margin-top:var(--space-xl);">
        <button id="cancelBtn" class="btn btn-outline" style="width:100%;justify-content:center;color:var(--punch);border-color:var(--punch);">
          Cancel this request
        </button>
      </div>
    </div>

    <div id="errorState" style="display:none;text-align:center;padding:var(--space-xl);">
      <div style="font-family:var(--font-display);font-size:1.4rem;margin-bottom:var(--space-sm);">Not found</div>
      <div style="color:var(--muted);font-size:0.88rem;">This booking link may be invalid or expired.</div>
    </div>
  </div>

  <div id="footerMount"></div>

  <script src="../slices/shared/auth.js"></script>
  <script src="../slices/shared/brand.js"></script>
  <script src="../slices/shared/api.js"></script>
  <script src="../lib/components/Toast.js"></script>
  <script src="../lib/components/Header.js"></script>
  <script src="../lib/components/Footer.js"></script>
  <script src="slice.js"></script>
</body>
</html>
