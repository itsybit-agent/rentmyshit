<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/slices/owner/landing/">
  <title>RentMyStuff</title>
  <link rel="stylesheet" href="../../shared/styles.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .landing-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--space-xl) var(--space-lg); gap: var(--space-xl); max-width: 420px; margin: 0 auto; width: 100%; }
    .owner-badge { display: flex; flex-direction: column; align-items: center; gap: var(--space-sm); text-align: center; }
    .owner-avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--ink); color: var(--paper); font-family: var(--font-display); font-size: 1.4rem; letter-spacing: 0.04em; display: flex; align-items: center; justify-content: center; }
    .owner-name { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 0.06em; }
    .owner-sub { font-size: 0.82rem; color: var(--muted); }
    .divider { width: 100%; border: none; border-top: 1px solid var(--rule); }
    .section-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: var(--space-md); }
    .pin-section, .request-section { width: 100%; }
    .pin-row { display: flex; gap: var(--space-sm); }
    .pin-row input { flex: 1; letter-spacing: 0.2em; font-size: 1.1rem; text-align: center; }
    .request-note { font-size: 0.78rem; color: var(--muted); line-height: 1.5; margin-top: var(--space-sm); }
    #pinError, #requestError { color: var(--punch); font-size: 0.8rem; margin-top: var(--space-sm); display: none; }
    #requestSuccess { display: none; padding: var(--space-md); background: var(--available-bg); border: 1px solid var(--available-bd); border-radius: var(--card-radius); font-size: 0.85rem; color: var(--available); text-align: center; }
  </style>
</head>
<body>
  <div id="headerMount"></div>

  <div class="landing-wrap">
    <div class="owner-badge">
      <div class="owner-avatar" id="ownerAvatar">?</div>
      <div class="owner-name" id="ownerName">Loading…</div>
      <div class="owner-sub" id="ownerSub"></div>
    </div>

    <hr class="divider">

    <!-- Owner PIN login -->
    <div class="pin-section">
      <div class="section-label">Owner login</div>
      <form id="pinForm">
        <div class="pin-row">
          <input type="password" id="pinInput" inputmode="numeric" pattern="[0-9]*"
            placeholder="PIN" autocomplete="current-password" required maxlength="8">
          <button type="submit" class="btn btn-primary">Enter</button>
        </div>
        <div id="pinError"></div>
      </form>
    </div>

    <hr class="divider">

    <!-- Access request for friends -->
    <div class="request-section">
      <div class="section-label">Want to borrow something?</div>
      <form id="requestForm">
        <div class="form-group" style="margin-bottom: var(--space-sm);">
          <input type="email" id="requestEmail" placeholder="Your email address" required autocomplete="email">
        </div>
        <div class="form-group" style="margin-bottom: var(--space-sm);">
          <textarea id="requestMsg" placeholder="Optional message…" rows="2" style="resize:none;"></textarea>
        </div>
        <button type="submit" class="btn btn-outline" style="width:100%;justify-content:center;">
          Ask for access
        </button>
        <div id="requestError"></div>
      </form>
      <div id="requestSuccess">
        ✓ Request sent! The owner will share their link with you.
      </div>
      <p class="request-note">The owner will send you a private link if they want to share their listing with you.</p>
    </div>
  </div>

  <div id="footerMount"></div>

  <script src="../../../lib/components/Toast.js"></script>
  <script src="../../shared/brand.js"></script>
  <script src="../../shared/auth.js"></script>
  <script src="../../shared/api.js"></script>
  <script src="../../../lib/components/Header.js"></script>
  <script src="../../../lib/components/Footer.js"></script>
  <script src="slice.js"></script>
</body>
</html>
