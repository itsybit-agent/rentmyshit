<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FörRåd</title>
</head>
<body>
<script>
  // Clean URL router: /slug → browse, /slug/admin → dashboard
  const path = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
  const parts = path.split('/');
  const slug = parts[0];
  const section = parts[1];

  if (!slug) {
    window.location.replace('/slices/owner/create-page/');
  } else if (section === 'admin') {
    window.location.replace('/slices/owner/dashboard/?slug=' + encodeURIComponent(slug));
  } else {
    const qs = window.location.search; // preserve ?t= token if present
    window.location.replace('/slices/borrower/browse/?slug=' + encodeURIComponent(slug) + (qs ? '&' + qs.slice(1) : ''));
  }
</script>
</body>
</html>
