<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item — RentMyShit</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .item-hero { background: var(--paper2); border: 1.5px solid var(--rule); border-radius: var(--card-radius); aspect-ratio: 16/7; display: flex; align-items: center; justify-content: center; margin-bottom: var(--space-xl); overflow: hidden; position: relative; }
    .item-hero img { width: 100%; height: 100%; object-fit: cover; }
    .item-hero-placeholder { display: flex; flex-direction: column; align-items: center; gap: var(--space-md); color: var(--faint); }
    .item-hero-placeholder svg { opacity: 0.4; }
    .item-hero-placeholder span { font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
    .detail-grid { display: grid; grid-template-columns: 1fr 380px; gap: var(--space-xl); align-items: start; }
    @media (max-width: 700px) { .detail-grid { grid-template-columns: 1fr; } }
    .item-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-md); margin-bottom: var(--space-md); }
    .item-big-name { font-family: var(--font-display); font-size: 2.2rem; letter-spacing: 0.04em; line-height: 1.05; }
    .item-big-rate { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 0.04em; color: var(--punch); white-space: nowrap; padding-top: 3px; }
    .item-big-rate small { font-family: var(--font-body); font-size: 0.75rem; color: var(--muted); font-weight: 500; letter-spacing: 0.04em; }
    .item-status-row { display: flex; align-items: center; gap: var(--space-md); margin-bottom: var(--space-xl); flex-wrap: wrap; }
    .owner-chip { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--muted); }
    .owner-chip .avatar-xs { width: 24px; height: 24px; border-radius: 50%; background: var(--ink); color: var(--paper); font-size: 0.6rem; font-weight: 700; display: flex; align-items: center; justify-content: center; letter-spacing: 0.02em; }
    .dot { color: var(--rule); }
    .item-desc { font-size: 0.95rem; line-height: 1.65; color: var(--ink-soft); margin-bottom: var(--space-xl); }
    .item-desc p + p { margin-top: var(--space-md); }
    .detail-section { margin-bottom: var(--space-xl); }
    .detail-section-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: var(--space-md); border-bottom: 1px solid var(--rule); padding-bottom: var(--space-sm); }
    .availability-block { background: var(--available-bg); border: 1.5px solid var(--available-bd); border-radius: var(--card-radius); padding: var(--space-md) var(--space-lg); display: flex; align-items: center; gap: var(--space-md); }
    .availability-block.booked { background: var(--booked-bg); border-color: var(--booked-bd); }
    .avail-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--available); flex-shrink: 0; }
    .availability-block.booked .avail-dot { background: var(--booked); }
    .avail-text { font-size: 0.88rem; }
    .avail-text strong { display: block; margin-bottom: 2px; }
    .avail-text span { color: var(--muted); font-size: 0.8rem; }
    .condition-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .condition-list li { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--ink-soft); }
    .condition-list li::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--rule); flex-shrink: 0; }
    .contact-block { background: var(--paper2); border: 1.5px solid var(--rule); border-radius: var(--card-radius); padding: var(--space-md) var(--space-lg); display: flex; align-items: center; gap: var(--space-md); }
    .contact-icon { width: 36px; height: 36px; border: 1.5px solid var(--rule); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--muted); }
    .contact-text { font-size: 0.85rem; }
    .contact-text strong { display: block; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 2px; }
    .contact-text a { color: var(--ink); text-decoration: none; font-weight: 500; }
    .contact-text a:hover { color: var(--punch); }
    .booking-col { position: sticky; top: var(--space-lg); }
    .booking-card { background: var(--paper); border: 1.5px solid var(--rule); border-radius: var(--card-radius); overflow: hidden; }
    .booking-card-header { padding: var(--space-md) var(--space-lg); border-bottom: 1px solid var(--rule); display: flex; align-items: center; justify-content: space-between; }
    .booking-card-header h3 { font-family: var(--font-display); font-size: 1.2rem; letter-spacing: 0.06em; }
    .booking-card-header .rate-pill { font-size: 0.82rem; font-weight: 600; color: var(--punch); }
    .booking-card .booking-form { padding: var(--space-lg); display: flex; flex-direction: column; gap: var(--space-md); background: transparent; border: none; margin-bottom: 0; }
    .no-payment-note { text-align: center; font-size: 0.72rem; color: var(--muted); padding-top: var(--space-sm); }
    .no-payment-note strong { color: var(--ink-soft); }
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: var(--space-lg); }
    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--ink); }
    .breadcrumb-sep { color: var(--rule); }
    .breadcrumb-current { color: var(--ink-soft); font-weight: 500; }
  </style>
</head>
<body>

  <div id="headerMount"></div>

  <!-- MAIN -->
  <main class="page-content">
    <div class="container">

      <div class="breadcrumb">
        <a href="friend-view.html" id="breadcrumbBack">Back</a>
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-current" id="breadcrumbItem"></span>
      </div>

      <div class="item-hero" id="itemHero">
        <div class="item-hero-placeholder">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Photo goes here</span>
        </div>
      </div>

      <div class="detail-grid">

        <!-- LEFT: Item info -->
        <div class="item-info-col">
          <div class="item-title-row">
            <h1 class="item-big-name" id="itemName"></h1>
            <div class="item-big-rate" id="itemRate"></div>
          </div>

          <div class="item-status-row" id="itemStatusRow"></div>

          <div class="item-desc" id="itemDesc"></div>

          <div class="detail-section" id="availabilitySection">
            <div class="detail-section-title">Availability</div>
            <div id="availabilityBlock"></div>
          </div>

          <div class="detail-section" id="conditionsSection" style="display:none;">
            <div class="detail-section-title">Borrowing conditions</div>
            <ul class="condition-list" id="conditionList"></ul>
          </div>

          <div class="detail-section" id="contactSection" style="display:none;">
            <div class="detail-section-title">Owner contact</div>
            <div id="contactBlock"></div>
          </div>
        </div>

        <!-- RIGHT: Booking form -->
        <div class="booking-col">
          <div class="booking-card">
            <div class="booking-card-header">
              <h3>Request booking</h3>
              <span class="rate-pill" id="formRate"></span>
            </div>
            <div class="booking-form" id="bookingFormMount"></div>
          </div>

          <div style="margin-top:var(--space-md);padding:var(--space-md);font-size:0.75rem;color:var(--muted);line-height:1.5;text-align:center;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            This list is only visible to people the owner shared the link with.
          </div>
        </div>

      </div>
    </div>
  </main>

  <div id="footerMount"></div>

  <!-- Components -->
  <script src="api.js"></script>
  <script src="components/Toast.js"></script>
  <script src="components/Modal.js"></script>
  <script src="components/StatusBadge.js"></script>
  <script src="components/Header.js"></script>
  <script src="components/Footer.js"></script>
  <script src="components/BookingForm.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const listingId = urlParams.get('id');
    const slug = urlParams.get('slug') || '';

    let itemData = null;
    let ownerName = '';

    async function loadItem() {
      try {
        itemData = await RMS.getListing(listingId);
        renderItem(itemData);
      } catch (err) {
        console.error('Failed to load item:', err);
        Toast.show('Could not load item details');
      }
    }

    function esc(str) {
      const el = document.createElement('span');
      el.textContent = str || '';
      return el.innerHTML;
    }

    function renderItem(data) {
      ownerName = data.ownerName || 'the owner';
      const initials = ownerName.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      const rate = data.dailyRate || 0;
      const status = data.status || 'available';
      const isBooked = status === 'booked';

      document.title = `${data.name} — RentMyShit`;

      // Header
      const backHref = slug ? `friend-view.html?slug=${encodeURIComponent(slug)}` : 'friend-view.html';
      document.getElementById('headerMount').innerHTML = Header.render({
        tagline: `Shared by ${ownerName}`,
        logoHref: backHref,
        actions: `<a href="${backHref}" class="btn btn-ghost btn-sm">&larr; All items</a>`,
      });
      document.getElementById('footerMount').innerHTML = Footer.render();

      // Breadcrumb
      document.getElementById('breadcrumbBack').href = backHref;
      document.getElementById('breadcrumbBack').textContent = `${ownerName}'s stuff`;
      document.getElementById('breadcrumbItem').textContent = data.name;

      // Hero image
      if (data.image_url) {
        document.getElementById('itemHero').innerHTML = `<img src="${esc(data.image_url)}" alt="${esc(data.name)}">`;
      }

      // Title + rate
      document.getElementById('itemName').textContent = data.name;
      document.getElementById('itemRate').innerHTML = `${rate} <small>kr/day</small>`;
      document.getElementById('formRate').textContent = `${rate} kr/day`;

      // Status row
      document.getElementById('itemStatusRow').innerHTML = `
        ${StatusBadge.render(status)}
        <span class="dot">&middot;</span>
        <div class="owner-chip">
          <div class="avatar-xs">${initials}</div>
          ${esc(ownerName)}
        </div>
        ${data.location ? `<span class="dot">&middot;</span><span style="font-size:0.82rem;color:var(--muted);">${esc(data.location)}</span>` : ''}
      `;

      // Description
      const desc = data.description || '';
      document.getElementById('itemDesc').innerHTML = desc.split('\n\n').map(p => `<p>${esc(p)}</p>`).join('');

      // Availability
      const availClass = isBooked ? ' booked' : '';
      const availLabel = isBooked ? 'Currently booked' : 'Available now';
      const availColor = isBooked ? 'var(--booked)' : 'var(--available)';
      document.getElementById('availabilityBlock').innerHTML = `
        <div class="availability-block${availClass}">
          <div class="avail-dot"></div>
          <div class="avail-text">
            <strong style="color:${availColor};">${availLabel}</strong>
            ${data.next_booked ? `<span>Next booked period: ${esc(data.next_booked)}</span>` : ''}
          </div>
        </div>`;

      // Conditions
      if (data.condition_notes) {
        document.getElementById('conditionsSection').style.display = '';
        const notes = Array.isArray(data.condition_notes) ? data.condition_notes : data.condition_notes.split('\n');
        document.getElementById('conditionList').innerHTML = notes.map(n => `<li>${esc(n)}</li>`).join('');
      }

      // Contact
      if (data.swishNumber || data.phone) {
        document.getElementById('contactSection').style.display = '';
        document.getElementById('contactBlock').innerHTML = `
          <div class="contact-block">
            <div class="contact-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.63A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
            </div>
            <div class="contact-text">
              <strong>Phone / Swish</strong>
              <a href="tel:${esc(data.swishNumber || data.phone)}">${esc(data.swishNumber || data.phone)}</a>
            </div>
          </div>`;
      }

      // Booking form
      document.getElementById('bookingFormMount').innerHTML = BookingForm.render({
        ownerName,
        dailyRate: rate,
        mode: 'sidebar',
        formId: 'bookingForm',
        listingId: listingId,
      });
      BookingForm.init('bookingForm');
    }

    if (listingId) loadItem();
  </script>
</body>
</html>
