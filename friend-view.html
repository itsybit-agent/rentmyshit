<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borrow stuff — RentMyShit</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .trust-note { background: var(--paper); border: 1.5px solid var(--rule); border-radius: var(--card-radius); padding: var(--space-md) var(--space-lg); margin-bottom: var(--space-xl); display: flex; align-items: center; gap: var(--space-md); font-size: 0.85rem; color: var(--muted); }
    .trust-note svg { flex-shrink: 0; color: var(--available); }
    .trust-note strong { color: var(--ink); }
    .search-bar { position: relative; margin-bottom: var(--space-lg); }
    .search-bar input { padding-left: 36px; }
    .search-bar svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--faint); pointer-events: none; }
    .filter-row { display: flex; gap: var(--space-sm); margin-bottom: var(--space-xl); flex-wrap: wrap; }
    .filter-btn { font-family: var(--font-body); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 12px; border: 1.5px solid var(--rule); border-radius: 20px; background: transparent; color: var(--muted); cursor: pointer; transition: all 0.1s; }
    .filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .filter-btn:hover:not(.active) { border-color: var(--ink-soft); color: var(--ink); }
    .item-card .item-request-btn { display: block; width: 100%; text-align: center; padding: 8px; background: var(--ink); color: var(--paper); font-family: var(--font-body); font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; border: none; cursor: pointer; transition: background 0.1s; }
    .item-card .item-request-btn:hover { background: var(--punch); }
    .item-card.booked .item-request-btn { background: var(--paper3); color: var(--muted); cursor: not-allowed; }
    .my-requests-banner { background: var(--pending-bg); border: 1.5px solid var(--pending-bd); border-radius: var(--card-radius); padding: var(--space-md) var(--space-lg); margin-bottom: var(--space-lg); display: flex; align-items: center; justify-content: space-between; gap: var(--space-md); flex-wrap: wrap; display: none; }
    .my-requests-banner .info { font-size: 0.85rem; color: var(--pending); }
    .my-requests-banner .info strong { display: block; font-size: 0.9rem; }
  </style>
</head>
<body>

  <div id="headerMount"></div>

  <!-- MAIN -->
  <main class="page-content">
    <div class="container">

      <!-- Owner banner -->
      <div class="owner-banner">
        <div class="owner-avatar" id="ownerAvatar"></div>
        <div class="owner-info">
          <h2 id="ownerTitle"></h2>
          <p id="ownerSubtitle"></p>
        </div>
      </div>

      <!-- Pending request banner -->
      <div class="my-requests-banner" id="pendingBanner">
        <div class="info">
          <strong>Your requests are being reviewed</strong>
          They'll get back to you with pickup details. Payment &amp; logistics happen offline.
        </div>
        <a href="#" class="btn btn-outline btn-sm">View my requests</a>
      </div>

      <!-- Trust note -->
      <div class="trust-note" id="trustNote">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span></span>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search for something..." id="searchInput" oninput="filterItems()">
      </div>

      <!-- Filters -->
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" onclick="setFilter(this, 'all')">All items</button>
        <button class="filter-btn" onclick="setFilter(this, 'available')">Available now</button>
      </div>

      <!-- ITEM GRID -->
      <div class="section-header">
        <h2 class="section-title">Available to borrow</h2>
        <span class="section-count" id="itemCount">0 items</span>
      </div>

      <div class="item-grid" id="itemGrid"></div>

    </div>
  </main>

  <div id="footerMount"></div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- REQUEST MODAL -->
  <div class="modal-overlay" id="requestModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="requestModalTitle">Request to borrow</h3>
        <button class="modal-close" onclick="Modal.close('requestModal'); setTimeout(() => BookingForm.reset('requestForm'), 300);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="requestFormMount"></div>
    </div>
  </div>

  <!-- Components -->
  <script src="api.js"></script>
  <script src="components/Toast.js"></script>
  <script src="components/Modal.js"></script>
  <script src="components/StatusBadge.js"></script>
  <script src="components/Header.js"></script>
  <script src="components/Footer.js"></script>
  <script src="components/ItemCard.js"></script>
  <script src="components/BookingForm.js"></script>

  <script>
    // Get slug from URL path or query param
    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get('slug') || window.location.pathname.split('/').pop().replace('.html', '') || '';

    let pageData = null;
    let activeFilter = 'all';
    let ownerName = '';

    async function loadPage() {
      try {
        pageData = await RMS.getOwnerPage(slug);
        ownerName = pageData.ownerName || 'the owner';
        renderPage(pageData);
      } catch (err) {
        console.error('Failed to load page:', err);
        Toast.show('Could not load this page');
      }
    }

    function renderPage(data) {
      const name = data.ownerName || 'Someone';
      const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      const listings = data.listings || [];
      const available = listings.filter(l => l.status !== 'booked').length;

      // Header
      document.getElementById('headerMount').innerHTML = Header.render({
        tagline: `Shared by ${name}`,
        actions: '<a href="setup.html" class="btn btn-ghost btn-sm">Got your own stuff? &rarr;</a>',
      });

      // Footer
      document.getElementById('footerMount').innerHTML = Footer.render({
        note: `Got your own stuff to share? <a href="setup.html" style="color:var(--punch);text-decoration:none;">Get your own link &rarr;</a>`,
      });

      // Owner banner
      document.getElementById('ownerAvatar').textContent = initials;
      document.getElementById('ownerTitle').textContent = `${name}'s stuff`;
      document.getElementById('ownerSubtitle').textContent =
        `${data.location || ''} \u00b7 ${available} items available \u00b7 Transactions offline \u2014 arrange directly with ${name}`;

      // Trust note
      document.querySelector('#trustNote span').innerHTML =
        `${name} shared this list with you personally. <strong>No payment on this platform</strong> \u2014 agree on terms directly. Only people with the link can see this.`;

      // Category filter buttons (from actual data)
      const categories = [...new Set(listings.map(l => l.category).filter(Boolean))];
      const filterRow = document.getElementById('filterRow');
      // Remove old dynamic buttons
      filterRow.querySelectorAll('[data-dynamic]').forEach(el => el.remove());
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.setAttribute('data-dynamic', '');
        btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        btn.onclick = function () { setFilter(this, cat); };
        filterRow.appendChild(btn);
      });

      // Render items
      const grid = document.getElementById('itemGrid');
      grid.innerHTML = '';
      listings.forEach(item => {
        grid.insertAdjacentHTML('beforeend', ItemCard.render(item, { mode: 'friend', slug }));
      });
      updateCount();

      // Mount booking form in modal
      document.getElementById('requestFormMount').innerHTML = BookingForm.render({
        ownerName: name,
        mode: 'modal',
        formId: 'requestForm',
      });
      BookingForm.init('requestForm', {
        onSuccess() {
          document.getElementById('pendingBanner').style.display = 'flex';
        },
      });

      Modal.init();
    }

    // Item request event — open modal and set listing ID
    window.addEventListener('item:request', function (e) {
      const { id, name } = e.detail;
      document.getElementById('requestModalTitle').textContent = `Borrow "${name}"`;
      const form = document.getElementById('requestForm');
      if (form) form.dataset.listingId = id;
      Modal.open('requestModal');
    });

    // Filter / search
    function setFilter(btn, filter) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = filter;
      filterItems();
    }

    function filterItems() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const cards = document.querySelectorAll('#itemGrid .item-card');
      cards.forEach(card => {
        const name = card.querySelector('.item-name').textContent.toLowerCase();
        const category = card.dataset.category || '';
        const available = card.dataset.available === 'true';
        const matchesSearch = !search || name.includes(search);
        const matchesFilter =
          activeFilter === 'all' ||
          (activeFilter === 'available' && available) ||
          category.includes(activeFilter);
        card.style.display = (matchesSearch && matchesFilter) ? '' : 'none';
      });
      updateCount();
    }

    function updateCount() {
      const visible = document.querySelectorAll('#itemGrid .item-card:not([style*="display: none"])').length;
      document.getElementById('itemCount').textContent = `${visible} item${visible !== 1 ? 's' : ''}`;
    }

    // Init
    if (slug) loadPage();
  </script>
</body>
</html>
