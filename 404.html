<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RentMyStuff</title>
</head>
<body>
<script>
  // Clean URL router:
  //   /slug           → landing (PIN login + access request)
  //   /slug?t=token   → browse (friend view)
  //   /slug/admin     → dashboard (PIN login)
  const path = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
  const parts = path.split('/');
  const slug = parts[0];
  const section = parts[1];
  const token = new URLSearchParams(window.location.search).get('t');

  if (!slug) {
    window.location.replace('/slices/owner/create-page/');
  } else if (section === 'admin') {
    window.location.replace('/slices/owner/dashboard/?slug=' + encodeURIComponent(slug));
  } else if (token) {
    window.location.replace('/slices/borrower/browse/?slug=' + encodeURIComponent(slug) + '&t=' + encodeURIComponent(token));
  } else {
    window.location.replace('/slices/owner/landing/?slug=' + encodeURIComponent(slug));
  }
</script>
</body>
</html>
