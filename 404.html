<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RentMyStuff</title>
</head>
<body>
<script>
  // Clean URL router: /slug → browse, /slug/admin → dashboard
  // This page is served as a custom 404 to handle clean slug URLs
  const path = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
  const parts = path.split('/');
  const slug = parts[0];
  const section = parts[1];

  if (!slug) {
    window.location.replace('/slices/owner/create-page/');
  } else if (section === 'admin') {
    window.location.replace('/slices/owner/dashboard/?slug=' + encodeURIComponent(slug));
  } else {
    const token = new URLSearchParams(window.location.search).get('t');
    const dest = '/slices/borrower/browse/?slug=' + encodeURIComponent(slug) + (token ? '&t=' + encodeURIComponent(token) : '');
    window.location.replace(dest);
  }
</script>
</body>
</html>
