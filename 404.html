<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>FörRåd</title></head>
<body>
<script>
  // Clean URL router — handles all slug-based routes
  const path = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
  const parts = path.split('/');
  const first = parts[0];
  const second = parts[1];
  const token = new URLSearchParams(window.location.search).get('t');

  if (!first || first === 'index.html') {
    window.location.replace('/');
  } else if (first === 'r' && second) {
    // Preserve any query params (e.g. ?id=bookingId) when redirecting
    const qs = window.location.search ? '&' + window.location.search.replace(/^\?/, '') : '';
    window.location.replace('/slices/borrower/booking-status/?token=' + encodeURIComponent(second) + qs);
  } else if (second === 'admin') {
    window.location.replace('/slices/owner/dashboard/?slug=' + encodeURIComponent(first));
  } else if (token) {
    window.location.replace('/slices/borrower/browse/?slug=' + encodeURIComponent(first) + '&t=' + encodeURIComponent(token));
  } else {
    window.location.replace('/slices/owner/landing/?slug=' + encodeURIComponent(first));
  }
</script>
</body>
</html>
